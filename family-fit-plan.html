}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function tds(){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];}
function aw(){return U.viewWeek!==null?U.viewWeek:Math.min(cw(),8);}

    var v=d&&d.value?d.value:new Date().toISOString().split('T')[0];
    sS({startDate:v});
  }
  else if(a==='wk'){sU({viewWeek:+p,tab:0});}
  else if(a==='prev'){if(w>1)sU({viewWeek:w-1});}
  else if(a==='next'){if(w<8)sU({viewWeek:w+1});}
  else if(a==='cur'){sU({viewWeek:null});}
  else if(a==='pick'){sU({picker:{day:p,type:q}});}
  else if(a==='cpick'){sU({picker:null});}
  else if(a==='sel'){
    if(!U.picker)return;
    var wd=S.weeks[w]||newWk();
    var ns=wd.schedule.map(function(d){return d.day===U.picker.day?{day:d.day,type:p}:{day:d.day,type:d.type};});
    var nd=Object.assign({},wd.done);nd['s-'+U.picker.day]=false;
    var wks=Object.assign({},S.weeks);wks[w]=Object.assign({},wd,{schedule:ns,done:nd});
    sS({weeks:wks});sU({picker:null});
  }
  else if(a==='done'){
    var wd2=S.weeks[w]||newWk();var nd2=Object.assign({},wd2.done);nd2[p]=!nd2[p];
    var wks2=Object.assign({},S.weeks);wks2[w]=Object.assign({},wd2,{done:nd2});sS({weeks:wks2});
  }

function rProg(clW,actW){
  var wks='';
  for(var i=0;i<8;i++){
    var wn=i+1,wd=S.weeks[wn],ws=(wd&&wd.schedule)||DS;

    var pc=(wT>0)?Math.round((wD/wT)*100):0,ad=(wD===wT&&wT>0);
    var pills=(!ift)?ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk';}).map(function(d){var a=gA(d.type),dn=(wd&&wd.done&&wd.done['s-'+d.day]);return'<span style="font-size:11px;font-family:sans-serif;font-weight:600;color:'+(ic?'rgba(255,255,255,.8)':dn?'#6B7C6B':'#6B7280')+';padding:2px 8px;background:'+(ic?'rgba(255,255,255,.15)':dn?'#F0FDF4':'#F3F4F6')+';border-radius:20px">'+a.emoji+' '+d.day+(dn?' ✓':'')+'</span>';}).join(''):'';
    wks+='<button data-a="wk" data-p="'+wn+'" style="background:'+(ic?'#6B7C6B':ift?'#F9FAFB':'#fff')+';border:2px solid '+(ic||wn===actW?'#6B7C6B':'#E5E7EB')+';border-radius:16px;padding:14px 16px;text-align:left;cursor:pointer;width:100%;opacity:'+(ift?.5:1)+';display:block;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-family:sans-serif;font-weight:800;font-size:15px;color:'+(ic?'#fff':'#1A1A1A')+'">Week '+wn+(ic?' <span style="background:rgba(255,255,255,.2);font-size:9px;padding:2px 8px;border-radius:10px">CURRENT</span>':'')+(ad&&!ic?' ✅':'')+(ift?' <span style="font-size:12px;font-weight:400;color:var(--muted)">🔒</span>':'')+'</div><div style="font-family:sans-serif;font-size:12px;color:'+(ic?'rgba(255,255,255,.65)':'#6B7280')+';margin-top:2px">'+fmt(d2.start)+' – '+fmt(d2.end)+'</div><div style="font-family:sans-serif;font-size:12px;color:'+(ic?'#C2D1C2':'#4B5563')+';margin-top:2px;font-style:italic">'+ph.label+'</div></div><div style="text-align:right;flex-shrink:0">'+(!ift?'<div style="font-family:sans-serif;font-weight:800;font-size:22px;color:'+(ic?'#fff':'#6B7C6B')+'">'+wD+'<span style="font-size:14px;font-weight:400;color:'+(ic?'rgba(255,255,255,.6)':'#6B7280')+'">/'+(wT)+'</span></div><div style="font-family:sans-serif;font-size:11px;color:'+(ic?'rgba(255,255,255,.6)':'#6B7280')+'">workouts</div>':'<div style="font-family:sans-serif;font-size:12px;color:var(--muted);margin-top:4px">Upcoming</div>')+'</div></div>'+(!ift&&wT>0?'<div style="margin-top:10px;background:'+(ic?'rgba(255,255,255,.2)':'#F3F4F6')+';border-radius:6px;height:6px;overflow:hidden"><div style="height:100%;width:'+pc+'%;background:'+(ic?'#fff':'#6B7C6B')+';border-radius:6px"></div></div><div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">'+pills+'</div>':'')+'</button>';
  }
  var cf=U.confirmStart?'<div style="background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:14px;padding:16px;text-align:center;margin-top:12px"><div style="font-family:sans-serif;font-weight:700;font-size:15px;color:#991B1B;margin-bottom:6px">Change start date?</div><div style="font-family:sans-serif;font-size:13px;color:#7F1D1D;margin-bottom:14px">Your workout history will be kept.</div><div style="display:flex;gap:10px"><button data-a="csn" style="flex:1;background:var(--card);border:1.5px solid #FCA5A5;border-radius:10px;padding:11px;font-family:sans-serif;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer">Cancel</button><button data-a="csy" style="flex:1;background:#DC2626;color:#fff;border:none;border-radius:10px;padding:11px;font-family:sans-serif;font-size:14px;font-weight:700;cursor:pointer">Yes, change it</button></div></div>':'<div style="margin-top:20px;text-align:center"><button data-a="csa" style="background:none;border:none;color:var(--muted);font-family:sans-serif;font-size:13px;cursor:pointer;text-decoration:underline">Change start date</button></div>';
  return'<div><div style="background:var(--tint);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;font-size:13px;color:#6B7C6B">📊 Tap any week to jump to it. Your progress syncs automatically.</div>'+wks+cf+'</div>';
}

function rRun(ph){
  return'<div><div style="background:var(--tint);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;font-size:13px;color:#6B7C6B">🛻 Running with a loaded stroller burns <strong>~20% more calories</strong>. Your current phase is highlighted.</div>'+RP.map(function(w,i){var ic=(i===ph),ip=(i<ph);return'<div style="background:'+(ic?'#6B7C6B':ip?'#F0FDF4':'#fff')+';border:2px solid '+(ic?'#6B7C6B':ip?'#86EFAC':'#E5E7EB')+';border-radius:16px;padding:16px;position:relative;overflow:hidden;margin-bottom:12px">'+(ic?'<div style="position:absolute;top:0;right:0;background:rgba(255,255,255,.18);padding:5px 14px;border-radius:0 16px 0 14px;font-family:sans-serif;font-size:9px;font-weight:800;color:#fff;letter-spacing:1.5px">YOU ARE HERE</div>':'')+'<div style="display:flex;align-items:flex-start;justify-content:space-between"><div style="flex:1;padding-right:8px"><div style="background:'+(ic?'rgba(255,255,255,.2)':ip?'#6B7C6B':'#F3F4F6')+';color:'+(ic?'#fff':ip?'#fff':'#6B7280')+';font-size:10px;font-family:sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px">'+w.weeks+'</div><div style="font-weight:700;font-size:17px;color:'+(ic?'#fff':'#1A1A1A')+'">'+w.label+'</div><div style="color:'+(ic?'#C2D1C2':'#E76F51')+';font-weight:700;font-family:sans-serif;margin-top:6px;font-size:15px">'+w.run+' <span style="color:'+(ic?'rgba(255,255,255,.55)':'#6B7280')+';font-weight:400;font-size:12px">'+w.reps+'</span></div><div style="color:'+(ic?'rgba(255,255,255,.65)':'#6B7280')+';font-family:sans-serif;font-size:12px;margin-top:2px">Total: '+w.total+'</div><div style="color:'+(ic?'rgba(255,255,255,.85)':'#4B5563')+';font-family:sans-serif;font-size:12px;margin-top:10px;font-style:italic">💬 '+w.tip+'</div></div>'+(ip?'<div style="font-size:26px">✅</div>':'')+'</div></div>';}).join('')+'</div>';
}

function rWO(){
  return'<div><div style="background:#FFF7ED;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;font-size:13px;color:#92400E">⏱️ <strong>15 minutes each.</strong> Do them after the kids are in bed. Alternate A &amp; B each week.</div>'+WO.map(function(w,wi){var op=(U.xW===wi);return'<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden"><button data-a="xw" data-p="'+wi+'" style="width:100%;padding:15px 16px;background:none;border:none;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:16px;color:var(--txt);font-family:sans-serif">Workout '+(wi===0?'A':'B')+': '+w.name+'</div><div style="color:var(--muted);font-size:12px;font-family:sans-serif;margin-top:2px">'+w.time+' · '+w.tag+'</div></div><span style="color:#6B7C6B;font-size:18px">'+(op?'▲':'▼')+'</span></button>'+(op?'<div style="border-top:1px solid var(--border)">'+w.moves.map(function(m,mi){return'<div style="display:flex;align-items:flex-start;padding:12px 16px;border-bottom:'+(mi<w.moves.length-1?'1px solid var(--border)':'none')+'"><div style="width:26px;height:26px;border-radius:50%;background:var(--tint);color:#6B7C6B;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:sans-serif;flex-shrink:0;margin-top:2px">'+(mi+1)+'</div><div style="margin-left:12px"><div style="font-weight:600;font-size:14px;font-family:sans-serif;color:var(--txt)">'+m.name+'</div><div style="color:#E76F51;font-family:sans-serif;font-size:13px;font-weight:600">'+m.sets+'</div>'+(m.note?'<div style="color:var(--muted);font-family:sans-serif;font-size:12px;font-style:italic;margin-top:2px">'+m.note+'</div>':'')+'</div></div>';}).join('')+'</div>':'')+'</div>';}).join('')+'</div>';
}

function init(){
  // Load from localStorage immediately so app always opens
  try{var l=localStorage.getItem(SK);if(l)S=Object.assign({},S,JSON.parse(l));}catch(x){}
  U.synced=true;
  render();
  // Then sync with Firebase in background (skipped on file://)
  if(location.protocol==='file:')return;
  try{
    var es=new EventSource(FB+'/fitTogether.json?accept=text/event-stream');
    es.addEventListener('put',function(e){
      var p=JSON.parse(e.data),val=p.data;
      if(val===null){if(S.startDate)fbWrite(S);}
      else{
      var inc=Object.assign({startDate:null,weeks:{}},val||{});
      if(!inc.startDate&&S.startDate)inc.startDate=S.startDate;
      S=inc;render();
    }
    });
    es.onerror=function(){es.close();};
  }catch(x){}
}
init();
</script>
</body>
</html>
