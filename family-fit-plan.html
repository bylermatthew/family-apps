<body>
<div id="root"></div>
<div id="a2hs" style="display:none">

  <div style="flex:1;line-height:1.5;font-family:sans-serif"><strong style="display:block;font-size:15px">Save as an App!</strong>Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong></div>

<script>
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone)
  document.getElementById('a2hs').style.display='flex';
</script>
<script>
var SK='fitTogether_v3';
var FB='https://family-fit-79ca0-default-rtdb.firebaseio.com';
var ACTS=[
  {type:'run',  label:'Stroller Run',emoji:'🏃',bg:'#DCFCE7',color:'#166534',border:'#86EFAC'},
  {type:'homeA',label:'Workout A',   emoji:'💪',bg:'#FEF3C7',color:'#92400E',border:'#FCD34D'},
  {type:'homeB',label:'Workout B',   emoji:'🔥',bg:'#FEF3C7',color:'#92400E',border:'#FCD34D'},
  {type:'walk', label:'Family Walk', emoji:'🚶',bg:'#EDE9FE',color:'#5B21B6',border:'#C4B5FD'},
  {type:'rest', label:'Rest Day',    emoji:'😴',bg:'#F3F4F6',color:'#6B7280',border:'#E5E7EB'},
];
function gA(t){return ACTS.find(function(a){return a.type===t;})||ACTS[4];}
var DS=[{day:'Mon',type:'rest'},{day:'Tue',type:'run'},{day:'Wed',type:'homeA'},{day:'Thu',type:'rest'},{day:'Fri',type:'run'},{day:'Sat',type:'homeB'},{day:'Sun',type:'walk'}];
var RP=[
  {weeks:'Weeks 1–2',label:'Getting Started',run:'Run 1 min / Walk 2 min',reps:'all the way around your 2.3 mi route',total:'~42–45 min',tip:'Walk as much as you need. Finishing the loop is the whole goal. Push those strollers! 💪'},
  {weeks:'Weeks 3–4',label:'Building Base',run:'Run 2 min / Walk 1 min',reps:'all the way around your 2.3 mi route',total:'~36–40 min',tip:'Your 2.3 mi loop will start feeling shorter each time. Your body is adapting.'},
  {weeks:'Weeks 5–6',label:'Finding Your Stride',run:'Run the first 1.15 mi straight, walk to recover, then run back as far as you can',reps:'',total:'~30–35 min',tip:'Try to beat your own distance on each run. Every trip farther than the last is a win!'},
  {weeks:'Weeks 7–8',label:'Run the Full Route',run:'Run all 2.3 miles without stopping',reps:'',total:'Target: under 30 min',tip:"You're running your full neighborhood loop pushing strollers. That's genuinely impressive. 🎉"},
];
var WO=[
  {name:'Starter Circuit A',time:'15 min',tag:'No equipment · Beginner friendly',moves:[
    {name:'Bodyweight Squats',sets:'2 × 10',note:'Feet shoulder-width, sit back like a chair. Slow and controlled.'},
    {name:'Knee Push-ups',sets:'2 × 8',note:'Hands wide, chest to floor. Upgrade to full push-ups when ready.'},
    {name:'Step-Back Lunges',sets:'2 × 8 each leg',note:'Step back (not forward) — easier on the knees. Hold a wall for balance.'},
    {name:'Plank Hold',sets:'2 × 15 sec',note:'On your knees is totally fine. Just hold a straight line and breathe.'},
    {name:'Marching in Place',sets:'2 × 30 sec',note:'High knees, keep moving. Gets your heart rate up without impact.'},
  ]},
  {name:'Starter Circuit B',time:'15 min',tag:'No equipment · Beginner friendly',moves:[
    {name:'Glute Bridges',sets:'2 × 12',note:'Lie on back, feet flat. Push hips up and hold 1 sec at the top.'},
    {name:'Superman Hold',sets:'2 × 10',note:'Lie face down, lift arms and legs 2 sec each. Easier than dead bugs.'},
    {name:'Wall Push-ups',sets:'2 × 10',note:'Hands on wall, lean in and push back. Great stepping stone to floor push-ups.'},
    {name:'Calf Raises',sets:'2 × 15',note:'Rise on your toes, slow lower. Directly helps your running stride.'},
    {name:'Hip Circles',sets:'2 × 10 each way',note:'Hands on hips, slow big circles. Loosens hips and lower back.'},
  ]},
];

var S={startDate:null,weeks:{}};
var U={tab:0,viewWeek:null,picker:null,xW:null,confirmStart:false,synced:false};

function fbWrite(d){fetch(FB+'/fitTogether.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){});}
function newWk(){return{schedule:DS.map(function(d){return{day:d.day,type:d.type};}),done:{},habits:{}};}
function sS(ns){S=Object.assign({},S,ns);try{localStorage.setItem(SK,JSON.stringify(S));}catch(x){}fbWrite(S);render();}
function sU(nu){U=Object.assign({},U,nu);render();}

function cw(){
  var s=new Date(S.startDate+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);
  var d=Math.floor((n-s)/86400000);if(d<0)return 1;return Math.min(Math.floor(d/7)+1,8);
}
function wkDates(wn){
  var s=new Date(S.startDate+'T00:00:00'),ws=new Date(s);ws.setDate(s.getDate()+(wn-1)*7);
  var we=new Date(ws);we.setDate(ws.getDate()+6);return{start:ws,end:we};
}
function fmt(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function tds(){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];}
function aw(){return U.viewWeek!==null?U.viewWeek:Math.min(cw(),8);}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-a]');if(!el)return;
  var a=el.dataset.a,p=el.dataset.p,q=el.dataset.q,w=aw();
  if(a==='tab'){sU({tab:+p});}
  else if(a==='setup'){
    var d=document.getElementById('sd');
    var v=d&&d.value?d.value:new Date().toISOString().split('T')[0];
    sS({startDate:v});
  }
  else if(a==='wk'){sU({viewWeek:+p,tab:0});}
  else if(a==='prev'){if(w>1)sU({viewWeek:w-1});}
  else if(a==='next'){if(w<8)sU({viewWeek:w+1});}
  else if(a==='cur'){sU({viewWeek:null});}
  else if(a==='pick'){sU({picker:{day:p,type:q}});}
  else if(a==='cpick'){sU({picker:null});}
  else if(a==='sel'){
    if(!U.picker)return;
    var wd=S.weeks[w]||newWk();
    var ns=wd.schedule.map(function(d){return d.day===U.picker.day?{day:d.day,type:p}:{day:d.day,type:d.type};});
    var nd=Object.assign({},wd.done);nd['s-'+U.picker.day]=false;
    var wks=Object.assign({},S.weeks);wks[w]=Object.assign({},wd,{schedule:ns,done:nd});
    sS({weeks:wks});sU({picker:null});
  }
  else if(a==='done'){
    var wd2=S.weeks[w]||newWk();var nd2=Object.assign({},wd2.done);nd2[p]=!nd2[p];
    var wks2=Object.assign({},S.weeks);wks2[w]=Object.assign({},wd2,{done:nd2});sS({weeks:wks2});
  }
  else if(a==='xw'){sU({xW:U.xW===+p?null:+p});}
  else if(a==='csa'){sU({confirmStart:true});}
  else if(a==='csn'){sU({confirmStart:false});}
  else if(a==='csy'){sS({startDate:null});sU({confirmStart:false,tab:0});}
});

function render(){
  var r=document.getElementById('root');
  try{
  if(!U.synced){r.innerHTML='<div style="min-height:100vh;background:linear-gradient(160deg,#1a4a32,#2D6A4F);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:52px">🏃‍♂️🏃‍♀️</div><div style="color:rgba(255,255,255,0.8);font-family:sans-serif;font-size:16px">Syncing your plan…</div></div>';return;}
  if(!S.startDate){
    r.innerHTML=rSetup();
    var inp=document.getElementById('sd');
    if(inp){inp.value=new Date().toISOString().split('T')[0];}
    return;
  }
  var curW=cw(),actW=aw(),clW=Math.min(curW,8);
  if(curW>8&&U.tab===0){r.innerHTML=rDone();return;}
  if(!S.weeks)S.weeks={};
  var wd=S.weeks[actW]||newWk(),sc=wd.schedule,dm=wd.done;
  var isCW=(actW===clW),isPW=(actW<clW);
  var wdy=sc.filter(function(d){return d.type!=='rest'&&d.type!=='walk';}).length;
  var wdn=sc.filter(function(d){return d.type!=='rest'&&d.type!=='walk'&&dm['s-'+d.day];}).length;
  var tot=0;for(var i=1;i<=8;i++){var w2=S.weeks[i]||newWk();tot+=w2.schedule.filter(function(d){return d.type!=='rest'&&d.type!=='walk'&&w2.done&&w2.done['s-'+d.day];}).length;}
  var ph=Math.min(Math.floor((actW-1)/2),3),dt=wkDates(actW),td=tds();
  r.innerHTML=rPicker()+rMain(actW,clW,isCW,isPW,sc,dm,td,wdy,wdn,tot,ph,dt);
  }catch(e){r.innerHTML='<div style="padding:20px;font-family:sans-serif;color:red"><b>Error:</b> '+e.message+'</div>';}
}

function rSetup(){
  var t=new Date().toISOString().split('T')[0];

}

function rDone(){
  var tot=0;Object.values(S.weeks).forEach(function(wd){var s=wd.schedule||DS;tot+=s.filter(function(d){return d.type!=='rest'&&d.type!=='walk'&&wd.done&&wd.done['s-'+d.day];}).length;});
  return'<div style="min-height:100vh;background:linear-gradient(160deg,#1a4a32,#2D6A4F);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center"><div style="font-size:72px;margin-bottom:16px">🏆</div><h1 style="color:#fff;font-family:sans-serif;font-size:32px;font-weight:800;margin-bottom:12px">You Did It!</h1><p style="color:#95D5B2;font-family:sans-serif;font-size:16px;line-height:1.7;max-width:320px;margin-bottom:32px">You completed your 8-week plan with <strong style="color:#fff">'+tot+' workouts</strong>. That\'s incredible. 💚</p><div style="background:rgba(255,255,255,.15);border-radius:20px;padding:20px 28px"><div style="color:rgba(255,255,255,.7);font-family:sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">What\'s next?</div><div style="color:#fff;font-family:sans-serif;font-size:15px;line-height:1.6">Keep your 2–3 workout routine going and increase your run time by 5 min each week. You\'re runners now! 🏃</div></div></div>';
}

function rPicker(){
  if(!U.picker)return'';
  var opts=ACTS.map(function(o){var s=(o.type===U.picker.type);return'<button data-a="sel" data-p="'+o.type+'" style="display:flex;align-items:center;gap:14px;padding:14px 22px;border:none;background:'+(s?'#F0FDF4':'none')+';width:100%;cursor:pointer;border-bottom:1px solid #E5E7EB;text-align:left"><div style="width:42px;height:42px;border-radius:12px;background:'+o.bg+';display:flex;align-items:center;justify-content:center;font-size:22px">'+o.emoji+'</div><div style="flex:1;font-family:sans-serif;font-size:15px;font-weight:'+(s?700:500)+';color:'+(s?'#2D6A4F':'#1A1A1A')+'">'+o.label+'</div>'+(s?'<div style="color:#2D6A4F;font-size:20px;font-weight:700">✓</div>':'')+'</button>';}).join('');
  return'<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-end"><div class="slide-up" style="background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:520px;margin:0 auto;padding-bottom:calc(var(--safe-bot) + 8px)"><div style="display:flex;justify-content:center;padding:14px 0 6px"><div style="width:40px;height:4px;border-radius:2px;background:#D1D5DB"></div></div><div style="padding:6px 22px 16px;border-bottom:1px solid #E5E7EB"><div style="font-family:sans-serif;font-weight:800;font-size:17px">'+U.picker.day+'</div><div style="font-family:sans-serif;font-size:13px;color:#6B7280;margin-top:2px">Choose this day\'s activity</div></div>'+opts+'<button data-a="cpick" style="width:100%;padding:16px;background:none;border:none;cursor:pointer;font-family:sans-serif;font-size:15px;color:#6B7280;font-weight:600">Cancel</button></div></div>';
}

function rMain(actW,clW,isCW,isPW,sc,dm,td,wdy,wdn,tot,ph,dt){
  return'<div style="background:#F9F6F1;min-height:100vh;padding-bottom:40px">'+rHdr(actW,clW,isCW,dt,wdy,wdn,tot)+rTabs()+'<div style="padding:16px;max-width:600px;margin:0 auto">'+(U.tab===0?rSched(actW,clW,isCW,isPW,sc,dm,td,wdy,wdn,dt):'')+(U.tab===1?rProg(clW,actW):'')+(U.tab===2?rRun(ph):'')+(U.tab===3?rWO():'')+'</div></div>';
}

function rHdr(actW,clW,isCW,dt,wdy,wdn,tot){
  var dots='';
  for(var i=0;i<8;i++){
    var wn=i+1,wd=S.weeks[wn],ws=wd?wd.schedule:DS;
    var wD=ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk'&&wd&&wd.done&&wd.done['s-'+d.day];}).length;
    var wT=ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk';}).length;
    var ic=(wn===clW),ift=(wn>clW),ia=(wn===actW),pc=(!ift&&wT>0)?wD/wT:0;
    var bg=ia?'#fff':ic?'rgba(255,255,255,.55)':ift?'rgba(255,255,255,.12)':pc===1?'#95D5B2':'linear-gradient(to right,#95D5B2 '+(pc*100)+'%,rgba(255,255,255,.2) '+(pc*100)+'%)';
    dots+='<button data-a="wk" data-p="'+wn+'" style="flex:1;height:'+(ia?8:5)+'px;border-radius:4px;border:none;cursor:pointer;background:'+bg+'"></button>';
  }
  return'<div style="background:#2D6A4F;padding:calc(var(--safe-top) + 18px) 20px 18px;position:relative;overflow:hidden"><div style="position:absolute;top:-40px;left:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05)"></div><div style="position:absolute;bottom:-25px;right:-15px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)"></div><div style="display:flex;align-items:flex-start;justify-content:space-between;position:relative"><div><div style="color:#95D5B2;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-family:sans-serif;margin-bottom:4px">Fit Together Plan</div><div style="color:#fff;font-family:sans-serif;font-weight:800;font-size:24px">Week '+actW+' <span style="color:#95D5B2;font-weight:400;font-size:16px">of 8</span>'+(isCW?'<span style="margin-left:10px;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:1px;vertical-align:middle">NOW</span>':'')+'</div><div style="color:rgba(255,255,255,.65);font-size:13px;font-family:sans-serif;margin-top:3px">'+fmt(dt.start)+' – '+fmt(dt.end)+'</div></div><div style="text-align:right;flex-shrink:0"><div style="color:#fff;font-weight:800;font-size:28px;font-family:sans-serif;line-height:1">'+wdn+'<span style="font-size:16px;font-weight:400;color:#95D5B2">/'+wdy+'</span></div><div style="color:#95D5B2;font-size:11px;font-family:sans-serif;margin-top:2px">this week</div><div style="color:rgba(255,255,255,.5);font-size:11px;font-family:sans-serif">'+tot+' total 💪</div></div></div><div style="margin-top:14px;display:flex;gap:5px;align-items:center">'+dots+'</div><div style="display:flex;justify-content:space-between;margin-top:4px;font-family:sans-serif;font-size:9px;color:rgba(255,255,255,.4)"><span>Wk 1</span><span>Wk 4</span><span>Wk 8</span></div></div>';
}

function rTabs(){
  var ts=['📅 Schedule','📊 Progress','🏃 Running','💪 Workouts'];
  return'<div class="tabs" style="background:#fff;border-bottom:2px solid #E5E7EB;padding:0 8px">'+ts.map(function(t,i){var a=(U.tab===i);return'<button data-a="tab" data-p="'+i+'" style="padding:12px 13px;border:none;background:none;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600;white-space:nowrap;color:'+(a?'#2D6A4F':'#6B7280')+';border-bottom:'+(a?'3px solid #2D6A4F':'3px solid transparent')+'">'+t+'</button>';}).join('')+'</div>';
}

function rSched(actW,clW,isCW,isPW,sc,dm,td,wdy,wdn,dt){
  var dp=sc.map(function(d){
    var a=gA(d.type),k='s-'+d.day,dn=!!dm[k],it=(isCW&&d.day===td),ir=(d.type==='rest'||d.type==='walk'),mt=it?'margin-top:8px;':'';
    return'<div style="display:flex;align-items:center;background:'+(dn?'#F0FDF4':'#fff')+';border:'+(it?2:1.5)+'px solid '+(dn?'#86EFAC':it?'#2D6A4F':a.border)+';border-radius:13px;padding:10px 12px;gap:10px;position:relative">'+(it?'<div style="position:absolute;top:-1px;left:10px;background:#2D6A4F;color:#fff;font-size:8px;font-family:sans-serif;font-weight:800;letter-spacing:1.5px;padding:2px 8px;border-radius:0 0 7px 7px;text-transform:uppercase">TODAY</div>':'')+'<div style="width:34px;font-weight:700;font-size:13px;color:'+(it?'#2D6A4F':'#6B7280')+';font-family:sans-serif;flex-shrink:0;'+mt+'">'+d.day+'</div><div style="flex:1;'+mt+'"><button data-a="pick" data-p="'+d.day+'" data-q="'+d.type+'" style="width:100%;display:flex;align-items:center;gap:8px;background:'+a.bg+';border:1.5px solid '+a.border+';border-radius:22px;padding:6px 10px 6px 8px;cursor:pointer;text-align:left"><span style="font-size:16px">'+a.emoji+'</span><span style="font-family:sans-serif;font-size:13px;font-weight:600;color:'+a.color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+a.label+'</span><span style="font-family:sans-serif;font-size:11px;color:'+a.color+';opacity:.5;margin-left:auto">✎</span></button></div>'+(!ir?'<button data-a="done" data-p="'+k+'" style="width:34px;height:34px;border-radius:50%;border:2px solid '+(dn?'#2D6A4F':'#E5E7EB')+';background:'+(dn?'#2D6A4F':'transparent')+';color:'+(dn?'#fff':'#6B7280')+';cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;'+mt+'">✓</button>':'')+'</div>';
  }).join('');
  var sm=['run','homeA','homeB','walk','rest'].map(function(t){var c=sc.filter(function(d){return d.type===t;}).length;if(!c)return'';var a=gA(t);return'<span style="background:'+a.bg+';color:'+a.color+';padding:4px 10px;border-radius:20px;font-family:sans-serif;font-size:12px;font-weight:600">'+a.emoji+' '+a.label+': '+c+'×</span>';}).join('');
  var nb='';
  if(!isCW){var bc=isPW?'#FEF3C7':'#EDE9FE',be=isPW?'#FCD34D':'#C4B5FD',tc=isPW?'#92400E':'#5B21B6';nb='<div style="background:'+bc+';border:1px solid '+be+';border-radius:12px;padding:10px 14px;margin-bottom:12px;font-family:sans-serif;font-size:13px;color:'+tc+';display:flex;justify-content:space-between;align-items:center"><span>'+(isPW?'📅 Viewing past week':'🗓️ Planning ahead')+'</span><button data-a="cur" style="background:'+tc+';color:#fff;border:none;border-radius:8px;padding:4px 12px;font-family:sans-serif;font-size:12px;font-weight:700;cursor:pointer">Current week</button></div>';}
  return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><button data-a="prev" style="width:36px;height:36px;border-radius:50%;border:2px solid '+(actW<=1?'#E5E7EB':'#2D6A4F')+';background:#fff;cursor:'+(actW<=1?'default':'pointer')+';color:'+(actW<=1?'#E5E7EB':'#2D6A4F')+';font-size:20px;display:flex;align-items:center;justify-content:center;font-weight:700">‹</button><div style="flex:1;text-align:center"><div style="font-family:sans-serif;font-weight:700;font-size:15px;color:#1A1A1A">'+(isCW?'This Week':'Week '+actW)+'</div><div style="font-family:sans-serif;font-size:12px;color:#6B7280">'+fmt(dt.start)+' – '+fmt(dt.end)+'</div></div><button data-a="next" style="width:36px;height:36px;border-radius:50%;border:2px solid '+(actW>=8?'#E5E7EB':'#2D6A4F')+';background:#fff;cursor:'+(actW>=8?'default':'pointer')+';color:'+(actW>=8?'#E5E7EB':'#2D6A4F')+';font-size:20px;display:flex;align-items:center;justify-content:center;font-weight:700">›</button></div>'+nb+'<div style="background:#FFF7ED;border:1px solid #FCD34D;border-radius:12px;padding:10px 14px;margin-bottom:12px;font-family:sans-serif;font-size:13px;color:#92400E">✏️ <strong>Tap the pill</strong> to change an activity · <strong>✓</strong> when done · '+wdn+'/'+wdy+' completed</div><div style="display:grid;gap:9px">'+dp+'</div><div style="margin-top:12px;background:#F0FDF4;border-radius:12px;padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap">'+sm+'</div><div style="margin-top:12px;background:#F0FDF4;border-radius:12px;padding:14px;font-family:sans-serif;font-size:13px;color:#2D6A4F"><strong>Daily calorie targets:</strong><div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap"><div style="background:#fff;border-radius:10px;padding:10px 14px;flex:1;min-width:130px"><div style="font-weight:700;font-size:14px">Him 🧔</div><div style="color:#E76F51;font-weight:700;margin-top:2px">~1,900 cal/day</div><div style="color:#6B7280;font-size:11px;margin-top:2px">~1 lb/week loss</div></div><div style="background:#fff;border-radius:10px;padding:10px 14px;flex:1;min-width:130px"><div style="font-weight:700;font-size:14px">Her 👩</div><div style="color:#E76F51;font-weight:700;margin-top:2px">~1,500 cal/day</div><div style="color:#6B7280;font-size:11px;margin-top:2px">~1 lb/week loss</div></div></div></div>';
}

function rProg(clW,actW){
  var wks='';
  for(var i=0;i<8;i++){
    var wn=i+1,wd=S.weeks[wn],ws=(wd&&wd.schedule)||DS;
    var wT=ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk';}).length;
    var wD=ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk'&&wd&&wd.done&&wd.done['s-'+d.day];}).length;
    var ic=(wn===clW),ift=(wn>clW),d2=wkDates(wn),ph=RP[Math.min(Math.floor((wn-1)/2),3)];
    var pc=(wT>0)?Math.round((wD/wT)*100):0,ad=(wD===wT&&wT>0);
    var pills=(!ift)?ws.filter(function(d){return d.type!=='rest'&&d.type!=='walk';}).map(function(d){var a=gA(d.type),dn=(wd&&wd.done&&wd.done['s-'+d.day]);return'<span style="font-size:11px;font-family:sans-serif;font-weight:600;color:'+(ic?'rgba(255,255,255,.8)':dn?'#2D6A4F':'#6B7280')+';padding:2px 8px;background:'+(ic?'rgba(255,255,255,.15)':dn?'#F0FDF4':'#F3F4F6')+';border-radius:20px">'+a.emoji+' '+d.day+(dn?' ✓':'')+'</span>';}).join(''):'';
    wks+='<button data-a="wk" data-p="'+wn+'" style="background:'+(ic?'#2D6A4F':ift?'#F9FAFB':'#fff')+';border:2px solid '+(ic||wn===actW?'#2D6A4F':'#E5E7EB')+';border-radius:16px;padding:14px 16px;text-align:left;cursor:pointer;width:100%;opacity:'+(ift?.5:1)+';display:block;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-family:sans-serif;font-weight:800;font-size:15px;color:'+(ic?'#fff':'#1A1A1A')+'">Week '+wn+(ic?' <span style="background:rgba(255,255,255,.2);font-size:9px;padding:2px 8px;border-radius:10px">CURRENT</span>':'')+(ad&&!ic?' ✅':'')+(ift?' <span style="font-size:12px;font-weight:400;color:#6B7280">🔒</span>':'')+'</div><div style="font-family:sans-serif;font-size:12px;color:'+(ic?'rgba(255,255,255,.65)':'#6B7280')+';margin-top:2px">'+fmt(d2.start)+' – '+fmt(d2.end)+'</div><div style="font-family:sans-serif;font-size:12px;color:'+(ic?'#95D5B2':'#4B5563')+';margin-top:2px;font-style:italic">'+ph.label+'</div></div><div style="text-align:right;flex-shrink:0">'+(!ift?'<div style="font-family:sans-serif;font-weight:800;font-size:22px;color:'+(ic?'#fff':'#2D6A4F')+'">'+wD+'<span style="font-size:14px;font-weight:400;color:'+(ic?'rgba(255,255,255,.6)':'#6B7280')+'">/'+(wT)+'</span></div><div style="font-family:sans-serif;font-size:11px;color:'+(ic?'rgba(255,255,255,.6)':'#6B7280')+'">workouts</div>':'<div style="font-family:sans-serif;font-size:12px;color:#6B7280;margin-top:4px">Upcoming</div>')+'</div></div>'+(!ift&&wT>0?'<div style="margin-top:10px;background:'+(ic?'rgba(255,255,255,.2)':'#F3F4F6')+';border-radius:6px;height:6px;overflow:hidden"><div style="height:100%;width:'+pc+'%;background:'+(ic?'#fff':'#2D6A4F')+';border-radius:6px"></div></div><div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">'+pills+'</div>':'')+'</button>';
  }
  var cf=U.confirmStart?'<div style="background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:14px;padding:16px;text-align:center;margin-top:12px"><div style="font-family:sans-serif;font-weight:700;font-size:15px;color:#991B1B;margin-bottom:6px">Change start date?</div><div style="font-family:sans-serif;font-size:13px;color:#7F1D1D;margin-bottom:14px">Your workout history will be kept.</div><div style="display:flex;gap:10px"><button data-a="csn" style="flex:1;background:#fff;border:1.5px solid #FCA5A5;border-radius:10px;padding:11px;font-family:sans-serif;font-size:14px;font-weight:600;color:#6B7280;cursor:pointer">Cancel</button><button data-a="csy" style="flex:1;background:#DC2626;color:#fff;border:none;border-radius:10px;padding:11px;font-family:sans-serif;font-size:14px;font-weight:700;cursor:pointer">Yes, change it</button></div></div>':'<div style="margin-top:20px;text-align:center"><button data-a="csa" style="background:none;border:none;color:#6B7280;font-family:sans-serif;font-size:13px;cursor:pointer;text-decoration:underline">Change start date</button></div>';
  return'<div><div style="background:#F0FDF4;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;font-size:13px;color:#2D6A4F">📊 Tap any week to jump to it. Your progress syncs automatically.</div>'+wks+cf+'</div>';
}

function rRun(ph){
  return'<div><div style="background:#F0FDF4;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:sans-serif;font-size:13px;color:#2D6A4F">🛻 Running with a loaded stroller burns <strong>~20% more calories</strong>. Your current phase is highlighted.</div>'+RP.map(function(w,i){var ic=(i===ph),ip=(i<ph);return'<div style="background:'+(ic?'#2D6A4F':ip?'#F0FDF4':'#fff')+';border:2px solid '+(ic?'#2D6A4F':ip?'#86EFAC':'#E5E7EB')+';border-radius:16px;padding:16px;position:relative;overflow:hidden;margin-bottom:12px">'+(ic?'<div style="position:absolute;top:0;right:0;background:rgba(255,255,255,.18);padding:5px 14px;border-radius:0 16px 0 14px;font-family:sans-serif;font-size:9px;font-weight:800;color:#fff;letter-spacing:1.5px">YOU ARE HERE</div>':'')+'<div style="display:flex;align-items:flex-start;justify-content:space-between"><div style="flex:1;padding-right:8px"><div style="background:'+(ic?'rgba(255,255,255,.2)':ip?'#2D6A4F':'#F3F4F6')+';color:'+(ic?'#fff':ip?'#fff':'#6B7280')+';font-size:10px;font-family:sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px">'+w.weeks+'</div><div style="font-weight:700;font-size:17px;color:'+(ic?'#fff':'#1A1A1A')+'">'+w.label+'</div><div style="color:'+(ic?'#95D5B2':'#E76F51')+';font-weight:700;font-family:sans-serif;margin-top:6px;font-size:15px">'+w.run+' <span style="color:'+(ic?'rgba(255,255,255,.55)':'#6B7280')+';font-weight:400;font-size:12px">'+w.reps+'</span></div><div style="color:'+(ic?'rgba(255,255,255,.65)':'#6B7280')+';font-family:sans-serif;font-size:12px;margin-top:2px">Total: '+w.total+'</div><div style="color:'+(ic?'rgba(255,255,255,.85)':'#4B5563')+';font-family:sans-serif;font-size:12px;margin-top:10px;font-style:italic">💬 '+w.tip+'</div></div>'+(ip?'<div style="font-size:26px">✅</div>':'')+'</div></div>';}).join('')+'</div>';
}

function init(){
  // Load from localStorage immediately so app always opens
  try{var l=localStorage.getItem(SK);if(l)S=Object.assign({},S,JSON.parse(l));}catch(x){}
  U.synced=true;
  render();
  // Then sync with Firebase in background (skipped on file://)
  if(location.protocol==='file:')return;
  try{
    var es=new EventSource(FB+'/fitTogether.json?accept=text/event-stream');
    es.addEventListener('put',function(e){
      var p=JSON.parse(e.data),val=p.data;
      if(val===null){if(S.startDate)fbWrite(S);}
      else{
      var inc=Object.assign({startDate:null,weeks:{}},val||{});
      if(!inc.startDate&&S.startDate)inc.startDate=S.startDate;
      S=inc;render();
    }
    });
    es.onerror=function(){es.close();};
  }catch(x){}
}
init();
