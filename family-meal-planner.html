// ── Calendar week helpers (Monday-start ISO weeks) ──────────
function getMonday(d){
  var dt=new Date(d);
  var day=dt.getDay();
  var diff=dt.getDate()-(day===0?6:day-1);
  dt.setDate(diff);dt.setHours(0,0,0,0);return dt;
}
function weekKey(d){
  var mon=getMonday(d);
  var y=mon.getFullYear(),m=mon.getMonth()+1,day=mon.getDate();
  return y+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);
}
function activeWeekKey(){
  return U.activeWeek||weekKey(new Date());
}
function getWeekDates(key){
  var mon=new Date(key+'T00:00:00');
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    days.push(d);
  }
  return days;
}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtWeekLabel(key){
  var dates=getWeekDates(key);
  return fmtDate(dates[0])+' – '+fmtDate(dates[6]);
}
function isCurrentWeek(key){return key===weekKey(new Date());}
function shiftWeek(key,n){
  var d=new Date(key+'T00:00:00');
  d.setDate(d.getDate()+n*7);
  return weekKey(d);
}
function getWeekPlan(key){return(S.weeks&&S.weeks[key])||{};}
function setWeekPlan(key,plan){
  var w=Object.assign({},S.weeks||{});
  w[key]=plan;
  S=Object.assign({},S,{weeks:w});
  fbWrite(S);render();
  syncGroceryList();
}
// Migrate old flat plan to current week if needed
function migrateIfNeeded(){
  if(S.plan&&Object.keys(S.plan).length>0&&(!S.weeks||Object.keys(S.weeks).length===0)){
    var key=weekKey(new Date());
    var newPlan={};
    var dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    Object.keys(S.plan).forEach(function(i){newPlan[dayNames[+i]]=S.plan[+i];});
    var w={};w[key]=newPlan;
    S.weeks=w;S.plan={};
    fbWrite(S);
    try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
    console.log('Migrated old plan to week',key);
  }
}
function getMethods(){
  var custom=S&&S.customMethods||{};
  return Object.assign({},METHODS,custom);
}

function syncGroceryList(){
  if(!S.groceryBuilt)return;
  var today=weekKey(new Date());
  var items=(S.groceryItems||[]).slice();
  var accountedSlots=(S.groceryAccountedSlots||[]).slice();

  // Build current plan slots (recipeId:weekKey:day)
  var currentSlots=[];
  Object.keys(S.weeks||{}).filter(function(wk){return wk>=today;}).sort().forEach(function(wk){
    var plan=S.weeks[wk]||{};
    Object.keys(plan).forEach(function(day){
      var id=plan[day];if(!id||getQP(id))return;
      currentSlots.push(id+':'+wk+':'+day);
    });
  });
  var currentSlotSet={};currentSlots.forEach(function(s){currentSlotSet[s]=true;});

  // Remove items and untrack slots for meals removed from plan
  var removedSet={};
  accountedSlots.filter(function(s){return!currentSlotSet[s];}).forEach(function(s){removedSet[s]=true;});
  if(Object.keys(removedSet).length){
    items=items.filter(function(it){return it.custom||!it.sourceSlot||!removedSet[it.sourceSlot];});
    accountedSlots=accountedSlots.filter(function(s){return currentSlotSet[s];});
  }

  // Add items for new slots
  var accountedSet={};accountedSlots.forEach(function(s){accountedSet[s]=true;});
  currentSlots.forEach(function(slot){
    if(accountedSet[slot])return;
    var parts=slot.split(':'),id=parts[0],wk=parts[1];
    var r=RECIPES.find(function(x){return x.id===id;});if(!r)return;
    var wkLabel=fmtWeekLabel(wk);

      var iid=makeItemId(item.name,id)+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);

    });
    accountedSlots.push(slot);
  });

  S=Object.assign({},S,{groceryItems:items,groceryAccountedSlots:accountedSlots});
  fbWrite(S);render();
}

function normalizeSearch(s){return(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function matchesSearch(text,val){if(!val)return true;var t=normalizeSearch(text);return normalizeSearch(val).split(' ').filter(Boolean).every(function(w){return t.includes(w);});}
function filterRecipes(val){

function runAutoFill(ingredients,startWeek,numWeeks,daysPerWeek){
  RECIPES=getRecipes();
  var apiKey=localStorage.getItem('mp_ak')||'';
  if(!apiKey){sU({chatOpen:true});return;}
  var dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  // Build week+day targets: fill consecutive empty slots per week starting from first empty
  var weeksList=[];
  for(var wi=0;wi<numWeeks;wi++){weeksList.push(shiftWeek(startWeek,wi));}
  // Build the plan targets for AI
  var todayWk=weekKey(new Date());
  var weekTargets=weeksList.filter(function(wk){return wk>=todayWk;}).map(function(wk){
    var existing=getWeekPlan(wk)||{};
    var emptyDays=dayNames.filter(function(d){return !existing[d];});
    var daysToFill=emptyDays.slice(0,daysPerWeek); // consecutive from first empty
    return{week:wk,label:fmtWeekLabel(wk),existing:existing,fill:daysToFill};
  }).filter(function(wt){return wt.fill.length>0;});
  if(weekTargets.length===0){alert('All selected days are already planned!');return;}
  var recipeList=RECIPES.map(function(r){return r.id+': '+r.name+' ('+r.method+')';}).join(', ');
  var sysPrompt='You are a meal planner assistant. Given a recipe library and constraints, return ONLY a JSON array of set_week_plan actions — no explanation, no markdown, just the raw JSON array. Each item: {"action":"set_week_plan","week":"YYYY-MM-DD","plan":{"Monday":"recipe-id",...}}. Only include the days specified. Pick varied meals, mix cooking methods across each week, avoid repeating the same recipe in the same week.';
  var userMsg='Recipe library: '+recipeList+'. Ingredients on hand: '+(ingredients||'none specified')+'. Fill these weeks: '+JSON.stringify(weekTargets.map(function(wt){return{week:wt.week,daysToFill:wt.fill,alreadyPlanned:Object.keys(wt.existing)};}));
  // Show a subtle loading indicator on the plan tab
  var pd=document.getElementById('plan-days');
  if(pd)pd.innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:12px">✨</div><div style="font-family:sans-serif;font-size:15px;color:#6B7C6B;font-weight:700">Auto-filling your meals…</div><div style="font-family:sans-serif;font-size:13px;color:#9CA3AF;margin-top:6px">This takes a few seconds</div></div>';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,system:sysPrompt,messages:[{role:'user',content:userMsg}]})
  }).then(function(resp){return resp.json();}).then(function(data){
    if(data.error)throw new Error(data.error.message);
    var text=(data.content&&data.content[0]&&data.content[0].text)||'[]';
    // Parse JSON array directly
    var clean=text.replace(/^[^\[]*/, '').replace(/[^\]]*$/, '');
    var actions=JSON.parse(clean);
    if(!Array.isArray(actions))actions=[actions];
    actions.forEach(function(action){
      if(action.action==='set_week_plan'&&action.week&&action.plan){
        var existing=Object.assign({},getWeekPlan(action.week)||{});
        Object.keys(action.plan).forEach(function(day){
          if(!existing[day])existing[day]=action.plan[day];
        });
        var w=Object.assign({},S.weeks||{});
        w[action.week]=existing;
        S=Object.assign({},S,{weeks:w});
      }
    });
    fbWrite(S);render();
    syncGroceryList();
  }).catch(function(err){
    render(); // restore plan view
    alert('Auto-fill error: '+err.message+'. Make sure your API key is set in the AI assistant.');
  });
}


// ── Swipe-to-delete for grocery items ───────────────────────
(function(){
  var startX=0,startY=0,el=null,contentEl=null,active=false,swiped=false;
  var THRESHOLD=70;
  document.addEventListener('touchstart',function(e){
    var item=e.target.closest('.swipe-item');
    if(!item)return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    el=item;
    contentEl=item.querySelector('.swipe-content');
    active=true;swiped=false;
    if(contentEl)contentEl.style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!active||!contentEl)return;
    var dx=e.touches[0].clientX-startX;
    var dy=e.touches[0].clientY-startY;
    if(!swiped&&Math.abs(dy)>Math.abs(dx)){active=false;contentEl.style.transition='transform 0.15s ease';contentEl.style.transform='translateX(0)';return;}
    if(dx>0)return;
    swiped=true;
    var travel=Math.max(dx,-90);
    contentEl.style.transform='translateX('+travel+'px)';
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!active||!contentEl){active=false;return;}
    var dx=e.changedTouches[0].clientX-startX;
    contentEl.style.transition='transform 0.15s ease';
    if(dx<-THRESHOLD){
      // Confirm delete
      contentEl.style.transform='translateX(-100%)';
      var id=el.dataset.id;
      _undoStack.push(JSON.parse(JSON.stringify(S)));if(_undoStack.length>_MAX_UNDO)_undoStack.shift();
      setTimeout(function(){
        S=Object.assign({},S,{groceryItems:(S.groceryItems||[]).filter(function(it){return it.id!==id;})});
        fbWrite(S);render();
      },180);
    } else {
      contentEl.style.transform='translateX(0)';
    }
    active=false;el=null;contentEl=null;
  },{passive:true});
})();

function getIngredients(prefix){
  var list=document.getElementById(prefix+'-ing-list');
  if(!list)return[];
  var rows=list.querySelectorAll('.ing-row');
  var out=[];
  rows.forEach(function(row){
    var n=row.querySelector('.ing-name');
    var s=row.querySelector('.ing-sect');
    if(n&&n.value.trim())out.push({name:n.value.trim(),section:s?s.value:'pantry'});
  });
  return out;
}

function init(){
  try{var l=localStorage.getItem(SK);if(l)S=Object.assign({},EMPTY,JSON.parse(l));}catch(x){}
  U.synced=true;
  render();
  if(location.protocol==='file:')return;
  setTimeout(function(){if(!U.synced){U.synced=true;render();}},4000);
  try{
    var es=new EventSource(FB+'/mealPlan.json?accept=text/event-stream');
    es.addEventListener('put',function(e){
      var p=JSON.parse(e.data),val=p.data;
      if(val===null){if(S.plan&&Object.keys(S.plan).length>0)fbWrite(S);}
      else{S=Object.assign({},EMPTY,val);render();}
    });
    es.onerror=function(){es.close();};
  }catch(x){}
}
init();
}catch(e){document.getElementById('root').innerHTML='<div style="padding:20px;font-family:sans-serif"><strong>Startup error:</strong><br>'+e.message+'<br>line: '+((e.stack||'').split('\n')[1]||'')+'</div>';}
</script>
