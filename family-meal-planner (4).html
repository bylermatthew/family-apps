var DAYS=['Monday','Tuesday','Wednesday','Thursday'];

var S=Object.assign({},EMPTY);

function fbWrite(d){fetch(FB+'/mealPlan.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){});}
function gM(t){return METHODS[t]||METHODS.stovetop;}
function sS(ns){S=Object.assign({},S,ns);fbWrite(S);render();}
function sU(nu){U=Object.assign({},U,nu);render();}

function getLastUsed(id){
  var d=S.history&&S.history[id];if(!d)return null;
  return Math.floor((new Date()-new Date(d))/86400000);
}
function lastUsedBadge(days){
  if(days===null||days===undefined||days>28)return'';
  var label=days<7?'This week':days<14?'Last week':days<21?'2 wks ago':'3 wks ago';
  var bg=days<7?'#FEE2E2':days<14?'#FEF3C7':days<21?'#FEF9C3':'#F3F4F6';
  var color=days<7?'#DC2626':days<14?'#D97706':days<21?'#CA8A04':'#6B7280';
  return'<span style="background:'+bg+';color:'+color+';font-size:10px;font-family:sans-serif;font-weight:700;padding:2px 8px;border-radius:10px">'+label+'</span>';
}
function buildList(){
  var seen={},list=[];
  Object.values(S.plan).forEach(function(id){
    var r=RECIPES.find(function(x){return x.id===id;});if(!r)return;
    r.groceryItems.forEach(function(item){
      var key=item.name.toLowerCase().replace(/[^\w]/g,'').slice(0,22);
      if(!seen[key]){seen[key]=true;list.push(Object.assign({},item,{id:'auto-'+key}));}
    });
  });
  return list;
}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-a]');if(!el)return;
  var a=el.dataset.a,p=el.dataset.p;

  if(a==='tab'){sU({tab:+p});}
  else if(a==='pick-day'){sU({pickingDay:+p,filter:'all'});}
  else if(a==='close-pick'){sU({pickingDay:null});}
  else if(a==='set-filter'){sU({filter:p});}
  else if(a==='select-recipe'){
    if(U.pickingDay===null)return;
    var np=Object.assign({},S.plan);np[U.pickingDay]=p;
    sS({plan:np,groceryBuilt:false});sU({pickingDay:null});
  }
  else if(a==='remove-meal'){
    var np2=Object.assign({},S.plan);delete np2[+p];sS({plan:np2,groceryBuilt:false});
  }
  else if(a==='view-recipe'){sU({viewRecipe:p});}
  else if(a==='close-recipe'){sU({viewRecipe:null});}
  else if(a==='build-grocery'){sS({autoItems:buildList(),groceryBuilt:true,checked:{}});}
  else if(a==='toggle-check'){
    var nc=Object.assign({},S.checked);nc[p]=!nc[p];sS({checked:nc});
  }
  else if(a==='add-custom'){
    var inp=document.getElementById('ci');
    var sel=document.getElementById('cs');
    if(!inp||!inp.value.trim())return;
    var nc2=S.custom.concat([{id:'c-'+Date.now(),name:inp.value.trim(),section:sel?sel.value:'produce',custom:true}]);
    inp.value='';sS({custom:nc2});
  }
  else if(a==='remove-custom'){sS({custom:S.custom.filter(function(c){return c.id!==p;})});}
  else if(a==='new-week-ask'){sU({confirmReset:true});}
  else if(a==='new-week-no'){sU({confirmReset:false});}
  else if(a==='new-week-yes'){
    var today=new Date().toISOString().split('T')[0];
    var nh=Object.assign({},S.history||{});
    Object.values(S.plan).forEach(function(id){nh[id]=today;});
    sS(Object.assign({},EMPTY,{history:nh}));sU({confirmReset:false,tab:0});
  }
});

function init(){
  try{var l=localStorage.getItem(SK);if(l)S=JSON.parse(l);}catch(x){}
  U.synced=true;
  render();
  if(location.protocol==='file:')return;
  try{
    var es=new EventSource(FB+'/mealPlan.json?accept=text/event-stream');
    es.addEventListener('put',function(e){
      var p=JSON.parse(e.data),val=p.data;
      if(val===null){if(S.plan&&Object.keys(S.plan).length>0)fbWrite(S);}
      else{S=Object.assign({},EMPTY,val||{});render();}
    });
    es.onerror=function(){es.close();};
  }catch(x){}
}
init();
}catch(e){document.getElementById('root').innerHTML='<div style="padding:20px;font-family:sans-serif"><strong>Startup error:</strong><br>'+e.message+'<br>line: '+((e.stack||'').split('\n')[1]||'')+'</div>';}
